<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SAFA OMRA</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#1A6B4A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SAFA OMRA">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; width:100%; overflow:hidden; background:#1A6B4A; }

  /* L'app Apps Script en plein écran */
  #app {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    border:none;
    display:none;
  }

  /* Écran de chargement (logo) affiché le temps que le dashboard charge */
  #splash {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#1A6B4A;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-family:'Helvetica Neue',sans-serif;
    z-index:10;
  }
  #splash img {
    width:120px; height:120px;
    border-radius:24px;
    margin-bottom:24px;
    box-shadow:0 4px 24px rgba(0,0,0,0.3);
    animation:pulse 1.6s ease-in-out infinite;
  }
  #splash h1 { font-size:24px; font-weight:700; letter-spacing:0.05em; margin-bottom:8px; }
  #splash p  { font-size:14px; opacity:0.7; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.05);opacity:0.85;} }
</style>
</head>
<body>

<!-- Écran de chargement -->
<div id="splash">
  <img src="icon.png" alt="SAFA OMRA">
  <h1>SAFA OMRA</h1>
  <p>Chargement du tableau de bord…</p>
</div>

<!-- Le dashboard Apps Script, chargé en plein écran -->
<iframe id="app"
  src="https://script.google.com/macros/s/AKfycbzs7fJffQ7j66HZFfFn0qGM7Dey8p376Eeokb9gepzSrsT-oH0VCwN6d1EHQnplDCbEVg/exec"
  allow="clipboard-write">
</iframe>

<script>
  // Service worker (PWA)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // Quand le dashboard est chargé, on masque le splash et on affiche l'app
  var app = document.getElementById('app');
  app.addEventListener('load', function () {
    document.getElementById('splash').style.display = 'none';
    app.style.display = 'block';
  });

  // Sécurité : si jamais le 'load' ne se déclenche pas, on affiche quand même après 6s
  setTimeout(function () {
    document.getElementById('splash').style.display = 'none';
    app.style.display = 'block';
  }, 6000);
</script>
</body>
</html>
