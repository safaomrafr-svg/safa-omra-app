<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAFA OMRA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#1A6B4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SAFA OMRA">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#1A6B4A; font-family:'Helvetica Neue',sans-serif; }
    .splash { text-align:center; color:#fff; }
    .splash img { width:96px; height:96px; border-radius:20px; margin-bottom:20px; box-shadow:0 4px 24px rgba(0,0,0,0.25); }
    .splash h1 { font-size:22px; font-weight:700; letter-spacing:0.05em; }
    .splash p { margin-top:10px; font-size:13px; opacity:0.65; }
    .dot { display:inline-block; animation:blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay:0.2s; }
    .dot:nth-child(3) { animation-delay:0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  </style>
</head>
<body>
  <div class="splash">
    <img src="icon.png" alt="SAFA OMRA">
    <h1>SAFA OMRA</h1>
    <p>Chargement<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
  </div>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    setTimeout(() => {
      window.location.replace('https://script.google.com/macros/s/AKfycbzs7fJffQ7j66HZFfFn0qGM7Dey8p376Eeokb9gepzSrsT-oH0VCwN6d1EHQnplDCbEVg/exec');
    }, 800);
  </script>
</body>
</html>
